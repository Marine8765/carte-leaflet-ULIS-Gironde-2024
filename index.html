<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte ULIS - Collèges Gironde 2024</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // Initialisation de la carte centrée sur la Gironde
    const map = L.map('map').setView([44.837789, -0.57918], 9);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Fonction pour charger et traiter le CSV
    async function loadCSV() {
        const response = await fetch('ULIS-collèges Gironde 2024 - Feuille 1.csv');
        const data = await response.text();

        Papa.parse(data, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Données chargées :", results.data);
                displayMarkers(results.data);
            }
        });
    }

    // Fonction pour afficher les marqueurs
    function displayMarkers(locations) {
        locations.forEach(location => {
            const lat = parseFloat(location.latitude);
            const lng = parseFloat(location.longitude);

            if (!isNaN(lat) && !isNaN(lng)) {
                const marker = L.marker([lat, lng]).addTo(map);
                
                const popupContent = `
                    <strong>${location.Nom_etablissement}</strong><br>
                    ${location.Nom_commune}<br>
                    <em>Type : ${location.libelle_nature} (${location.Statut_public_prive})</em><br>
                    <strong>Nombre d'élèves ULIS : ${location["Nombre d'élèves total ULIS"]}</strong><br>
                    Adresse : ${location.Adresse_1} ${location.Adresse_2 || ''}
                `;
                
                marker.bindPopup(popupContent);
            }
        });
    }

    loadCSV();
</script>

</body>
</html>
